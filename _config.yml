title: 'Meet Adam Zolyak'
description: 'Learn about Adam and his work.'
url: 'https://adamzolyak.com'
baseurl: ''
author:
  name: Adam Zolyak
  email: ''

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:slug/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate-v2

# Pagination
pagination:
  enabled: true
  per_page: 10
  permalink: '/page/:num/'
  sort_field: 'date'
  sort_reverse: true

# Collections / pages
include:
  - _pages

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

# Navigation
nav_links:
  - title: 'About'
    url: '/about/'
  - title: 'Spacious Work'
    url: '/spacious-work/'
  - title: 'Making'
    url: '/making/'
  - title: 'LinkedIn'
    url: 'https://www.linkedin.com/in/azolyak/'
    external: true

# Tags (site sections)
site_tags:
  - slug: spacious-work
    title: Spacious Work
  - slug: making
    title: Making
  - slug: ideas
    title: Ideas
  - slug: tools-for-humanity
    title: Tools for Humanity
