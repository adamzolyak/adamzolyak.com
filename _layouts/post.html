---
layout: default
---
<article class="post">
  <header class="post-header">
    {% if page.tags.size > 0 %}
    <div class="post-tags">
      {% for tag in page.tags %}
        <a href="{{ '/tag/' | append: tag | relative_url }}" class="post-tag">{{ tag | replace: '-', ' ' | capitalize }}</a>
      {% endfor %}
    </div>
    {% endif %}
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    </div>
    {% if page.image %}
    <div class="post-feature-image">
      <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
    </div>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}" class="back-link">&larr; All posts</a>
  </footer>
</article>
