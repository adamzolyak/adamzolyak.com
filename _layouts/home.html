---
layout: default
---
<div class="home-hero">
  <h1 class="home-tagline">{{ site.description }}</h1>
</div>

<div class="home-content">
  {% assign all_posts = site.posts %}

  {% if all_posts.size > 0 %}
  <section class="posts-section">
    <div class="post-grid">
      {% for post in all_posts %}
        {% include post-card.html post=post %}
      {% endfor %}
    </div>
  </section>
  {% endif %}
</div>
